version: "3.9"

services:

  backend:

    build: .

    container_name: enterprise-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mysql

  mysql:

    image: mysql:8

    container_name: enterprise-mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: password

      MYSQL_DATABASE: enterprise_support_ai

    ports:

      - "3306:3306"

    volumes:

      - mysql_data:/var/lib/mysql

volumes:

  mysql_data: